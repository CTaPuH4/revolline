services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-revolline}
      POSTGRES_USER: ${POSTGRES_USER:-revolline}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-revolline}
    ports:
      - "${POSTGRES_PORT_PUBLIC:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      SECRET_KEY: ${SECRET_KEY:-django-insecure-dev-only-change-me}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0,backend}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      CSRF_COOKIE_SECURE: ${CSRF_COOKIE_SECURE:-0}
      CSRF_COOKIE_SAMESITE: ${CSRF_COOKIE_SAMESITE:-Lax}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_TO_FILE: ${LOG_TO_FILE:-0}
      LOG_REQUEST_BODY: ${LOG_REQUEST_BODY:-0}
      LOG_RESPONSE_BODY: ${LOG_RESPONSE_BODY:-0}
      THROTTLE_ANON_RATE: ${THROTTLE_ANON_RATE:-120/min}
      THROTTLE_USER_RATE: ${THROTTLE_USER_RATE:-600/min}
      THROTTLE_AUTH_RATE: ${THROTTLE_AUTH_RATE:-20/min}
      THROTTLE_PASSWORD_RESET_RATE: ${THROTTLE_PASSWORD_RESET_RATE:-5/min}
      DB_ENGINE: postgres
      POSTGRES_DB: ${POSTGRES_DB:-revolline}
      POSTGRES_USER: ${POSTGRES_USER:-revolline}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-revolline}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      CACHE_URL: ${CACHE_URL:-redis://redis:6379/2}
      ORDER_STATUS_SYNC_INTERVAL_SECONDS: ${ORDER_STATUS_SYNC_INTERVAL_SECONDS:-300}
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      ORDER_NOTIFICATION_EMAIL: ${ORDER_NOTIFICATION_EMAIL:-}
      PAYMENT_ALERT_EMAIL: ${PAYMENT_ALERT_EMAIL:-}
      PAYMENT_TOKEN: ${PAYMENT_TOKEN:-}
      PHONE_NUMBER: ${PHONE_NUMBER:-}
      PAYMENT_BASE_URL: ${PAYMENT_BASE_URL:-https://enter.tochka.com/uapi}
      PAYMENT_SUCCESS_REDIRECT_URL: ${PAYMENT_SUCCESS_REDIRECT_URL:-http://localhost:5173/orders}
      PAYMENT_FAIL_REDIRECT_URL: ${PAYMENT_FAIL_REDIRECT_URL:-http://localhost:5173/cart}
      PAYMENT_CONNECT_TIMEOUT: ${PAYMENT_CONNECT_TIMEOUT:-5}
      PAYMENT_READ_TIMEOUT: ${PAYMENT_READ_TIMEOUT:-20}
      PAYMENT_WEBHOOK_PUBLIC_JWK: ${PAYMENT_WEBHOOK_PUBLIC_JWK:-}
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_media:/app/images
    command: >
      sh -c "rm -rf /tmp/prometheus && mkdir -p /tmp/prometheus &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  prometheus:
    image: prom/prometheus:v3.5.0
    depends_on:
      - backend
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:12.1.1
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro

  celery-worker:
    build:
      context: ./backend
    environment:
      SECRET_KEY: ${SECRET_KEY:-django-insecure-dev-only-change-me}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0,backend}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      CSRF_COOKIE_SECURE: ${CSRF_COOKIE_SECURE:-0}
      CSRF_COOKIE_SAMESITE: ${CSRF_COOKIE_SAMESITE:-Lax}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_TO_FILE: ${LOG_TO_FILE:-0}
      LOG_REQUEST_BODY: ${LOG_REQUEST_BODY:-0}
      LOG_RESPONSE_BODY: ${LOG_RESPONSE_BODY:-0}
      DB_ENGINE: postgres
      POSTGRES_DB: ${POSTGRES_DB:-revolline}
      POSTGRES_USER: ${POSTGRES_USER:-revolline}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-revolline}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      ORDER_STATUS_SYNC_INTERVAL_SECONDS: ${ORDER_STATUS_SYNC_INTERVAL_SECONDS:-300}
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      ORDER_NOTIFICATION_EMAIL: ${ORDER_NOTIFICATION_EMAIL:-}
      PAYMENT_ALERT_EMAIL: ${PAYMENT_ALERT_EMAIL:-}
      PAYMENT_TOKEN: ${PAYMENT_TOKEN:-}
      PAYMENT_BASE_URL: ${PAYMENT_BASE_URL:-https://enter.tochka.com/uapi}
      PAYMENT_CONNECT_TIMEOUT: ${PAYMENT_CONNECT_TIMEOUT:-5}
      PAYMENT_READ_TIMEOUT: ${PAYMENT_READ_TIMEOUT:-20}
      PAYMENT_WEBHOOK_PUBLIC_JWK: ${PAYMENT_WEBHOOK_PUBLIC_JWK:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_media:/app/images
    command: celery -A revolline worker --loglevel=info

  celery-beat:
    build:
      context: ./backend
    environment:
      SECRET_KEY: ${SECRET_KEY:-django-insecure-dev-only-change-me}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0,backend}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      CSRF_COOKIE_SECURE: ${CSRF_COOKIE_SECURE:-0}
      CSRF_COOKIE_SAMESITE: ${CSRF_COOKIE_SAMESITE:-Lax}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_TO_FILE: ${LOG_TO_FILE:-0}
      LOG_REQUEST_BODY: ${LOG_REQUEST_BODY:-0}
      LOG_RESPONSE_BODY: ${LOG_RESPONSE_BODY:-0}
      DB_ENGINE: postgres
      POSTGRES_DB: ${POSTGRES_DB:-revolline}
      POSTGRES_USER: ${POSTGRES_USER:-revolline}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-revolline}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      ORDER_STATUS_SYNC_INTERVAL_SECONDS: ${ORDER_STATUS_SYNC_INTERVAL_SECONDS:-300}
      PAYMENT_TOKEN: ${PAYMENT_TOKEN:-}
      PAYMENT_BASE_URL: ${PAYMENT_BASE_URL:-https://enter.tochka.com/uapi}
      PAYMENT_CONNECT_TIMEOUT: ${PAYMENT_CONNECT_TIMEOUT:-5}
      PAYMENT_READ_TIMEOUT: ${PAYMENT_READ_TIMEOUT:-20}
      PAYMENT_WEBHOOK_PUBLIC_JWK: ${PAYMENT_WEBHOOK_PUBLIC_JWK:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_media:/app/images
    command: celery -A revolline beat --loglevel=info --schedule=/tmp/celerybeat-schedule

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8000/api}
      VITE_YANDEX_API_KEY: ${VITE_YANDEX_API_KEY:-}
      VITE_CDEK_SERVICE_PATH: ${VITE_CDEK_SERVICE_PATH:-http://localhost:8001/service.php}
    depends_on:
      - backend
      - php-cdek
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0

  php-cdek:
    build:
      context: ./backend
      dockerfile: Dockerfile.php
    environment:
      CDEK_LOGIN: ${CDEK_LOGIN:-}
      CDEK_SECRET: ${CDEK_SECRET:-}
      CDEK_BASE_URL: ${CDEK_BASE_URL:-https://api.edu.cdek.ru/v2}
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app
    command: php -S 0.0.0.0:8001 -t /app

volumes:
  postgres_data:
  backend_media:
  frontend_node_modules:
  prometheus_data:
  grafana_data:
